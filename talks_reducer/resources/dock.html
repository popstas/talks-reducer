<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS Processing Dock</title>
  <style>
    :root {
      --bg: #272A33;
      --panel: #272A33;
      --input-bg: #3C404D;
      --text: #e8eaf0;
      --muted: #9aa3b2;
      --line: #3C404D;
      --ok: #35c46a;
      --warn: #f5b942;
      --bad: #ff5c7a;
      --accent: #6ea8fe;
      --accent2: #9ec5fe;
      --shadow: rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 10px 4px 0;
      color: var(--text);
      background: var(--bg);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: 100%;
    }

    .card {
      background: var(--panel);
      padding: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--bad);
    }

    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }

    label.small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row {
      margin-top: 10px;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .radio-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    .radio-pill input { margin: 0; }

    .check-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    .check-row input { margin: 0; }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-inline-start: 10px;
    }

    .buttons button {
      flex: 1 1 auto;
      min-width: 3.5em;
    }

    #processingControls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #processingControls.hidden {
      display: none;
    }

    #presetControls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #presetControls.hidden {
      display: none;
    }

    #manualControls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #manualControls.hidden {
      display: none;
    }

    select {
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: var(--accent); }

    button {
      border: 0;
      border-radius: 3px;
      padding: 10px 10px;
      color: #fff;
      background: var(--input-bg);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .45; cursor: not-allowed; filter: none; }

    .log {
      margin-top: 10px;
      max-height: 150px;
      overflow: auto;
      padding: 8px 10px;
      color: var(--muted);
      background: #0c0e12;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .settings {
      flex: 0 0 auto;
    }

    .settings[open] {
      flex-basis: 100%;
    }

    .settings summary {
      display: inline-block;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      padding: 10px 10px;
      line-height: 1;
    }

    .settings summary::-webkit-details-marker {
      display: none;
    }

    .settings[open] summary {
      margin-bottom: 8px;
    }

    .connection-block {
      margin-top: 10px;
    }

    .connection-block .status {
      margin-bottom: 8px;
    }

    .connection-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .connection-actions button {
      flex: 1 1 auto;
    }

    .toolbar-connect {
      min-width: 8em;
    }

    .toolbar-notice {
      color: var(--bad);
      font-size: 12px;
      white-space: nowrap;
    }

    .toolbar-notice.warn { color: var(--warn); }

    .hidden { display: none; }

    @media (min-width: 301px) {
      .wrap {
        display: flex;
        justify-content: center;
      }

      .card {
        width: fit-content;
        max-width: 100%;
      }

      .toolbar {
        justify-content: center;
      }

      .settings[open] {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .settings[open] > :not(summary) {
        width: min(100%, 480px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div id="processingControls" class="hidden">
          <div id="presetControls" class="hidden">
            <select id="presetSelect"></select>
            <button id="presetProcessBtn" disabled>Process</button>
          </div>

          <div id="manualControls">
            <div class="radio-group">
              <label class="radio-pill"><input type="radio" name="resolution" value="1080p" /> 1080p</label>
              <label class="radio-pill"><input type="radio" name="resolution" value="720p" checked /> 720p</label>
              <label class="radio-pill"><input type="radio" name="resolution" value="480p" /> 480p</label>
            </div>

            <div class="buttons">
              <button data-speed="1" disabled>1x</button>
              <button data-speed="5" disabled>5x</button>
              <button data-speed="10" disabled>10x</button>
            </div>
          </div>
        </div>

        <button id="toolbarConnectBtn" class="toolbar-connect">Connect</button>
        <span id="toolbarNotice" class="toolbar-notice hidden"></span>

        <details class="settings">
          <summary>Settings</summary>
          <div id="manualSettingsSlot" class="row hidden"></div>
          <div class="row">
            <label class="small">Codec</label>
            <div class="radio-group">
              <label class="radio-pill"><input type="radio" name="codec" value="h264" checked /> h264</label>
              <label class="radio-pill"><input type="radio" name="codec" value="hevc" /> hevc</label>
              <label class="radio-pill"><input type="radio" name="codec" value="av1" /> av1</label>
              <label class="radio-pill"><input type="radio" name="codec" value="mp3" /> mp3</label>
            </div>
          </div>
          <div class="row">
            <label class="check-row">
              <input id="autoClose" type="checkbox" />
              Auto close
            </label>
          </div>
          <div class="row">
            <label class="small" for="talksReducerExe">Talks Reducer</label>
            <input id="talksReducerExe" type="text" value="%LOCALAPPDATA%\Programs\talks-reducer\talks-reducer.exe" />
          </div>
          <div id="log" class="log">Ready.</div>
          <div class="connection-block">
            <span id="obsStatusWrap" class="status"><span id="obsDot" class="dot"></span><span id="obsStatus">OBS: disconnected</span></span>
            <div class="grid">
              <div>
                <label class="small" for="obsUrl">OBS WebSocket</label>
                <input id="obsUrl" type="text" value="ws://127.0.0.1:4455" />
              </div>
              <div>
                <label class="small" for="obsPassword">Password</label>
                <input id="obsPassword" type="password" placeholder="optional" />
              </div>
            </div>
            <div class="connection-actions">
              <button id="connectBtn">Connect to OBS</button>
              <button id="disconnectBtn" class="hidden">Disconnect</button>
            </div>
          </div>
        </details>
      </div>
    </div>
  </div>

<script>
(() => {
  // Prefer the origin the page was served from (so any --port works and the
  // dock can be opened straight from the dock-server). Fall back to the default
  // port when loaded as a local file:// document inside OBS.
  const SERVER_ORIGIN = location.origin && location.origin.startsWith('http')
    ? location.origin
    : 'http://127.0.0.1:17890';
  const PROCESS_URL = SERVER_ORIGIN + '/process';
  const PRESETS_URL = SERVER_ORIGIN + '/presets';
  const DEFAULT_EXE = '%LOCALAPPDATA%\\Programs\\talks-reducer\\talks-reducer.exe';
  const DEFAULT_CODEC = 'h264';
  const ALLOWED_CODECS = new Set(['h264', 'hevc', 'av1', 'mp3']);
  const INITIAL_RETRY_DELAY_MS = 1000;
  const MAX_RETRY_DELAY_MS = 60000;

  const $ = (id) => document.getElementById(id);
  const obsUrl = $('obsUrl');
  const obsPassword = $('obsPassword');
  const talksReducerExe = $('talksReducerExe');
  const autoClose = $('autoClose');
  const obsDot = $('obsDot');
  const obsStatus = $('obsStatus');
  const obsStatusWrap = $('obsStatusWrap');
  const connectBtn = $('connectBtn');
  const disconnectBtn = $('disconnectBtn');
  const toolbarConnectBtn = $('toolbarConnectBtn');
  const toolbarNotice = $('toolbarNotice');
  const processingControls = $('processingControls');
  const presetControls = $('presetControls');
  const presetSelect = $('presetSelect');
  const presetProcessBtn = $('presetProcessBtn');
  const manualControls = $('manualControls');
  const manualSettingsSlot = $('manualSettingsSlot');
  const settings = document.querySelector('.settings');
  const logEl = $('log');
  const speedButtons = document.querySelectorAll('button[data-speed]');

  let presetList = [];

  let ws = null;
  let connected = false;
  let authFailed = false;
  let manualDisconnect = false;
  let autoConnectEnabled = true;
  let retryAttempt = 0;
  let retryTimer = null;
  let connectTimeoutTimer = null;
  let connectGeneration = 0;
  let connectSettled = false;
  let lastRecordingPath = '';

  obsUrl.value = localStorage.getItem('obsDock.obsUrl') || obsUrl.value;
  obsPassword.value = localStorage.getItem('obsDock.obsPassword') || '';
  talksReducerExe.value = localStorage.getItem('obsDock.talksReducerExe') || DEFAULT_EXE;
  const savedCodec = localStorage.getItem('obsDock.videoCodec') || DEFAULT_CODEC;
  if (ALLOWED_CODECS.has(savedCodec)) {
    const codecInput = document.querySelector(`input[name="codec"][value="${savedCodec}"]`);
    if (codecInput) codecInput.checked = true;
  }
  autoClose.checked = localStorage.getItem('obsDock.autoClose') === '1';

  function log(message) {
    const time = new Date().toLocaleTimeString();
    logEl.textContent = `[${time}] ${message}\n` + logEl.textContent;
  }

  function setNotice(text, kind) {
    toolbarNotice.textContent = text || '';
    toolbarNotice.className = 'toolbar-notice' + (kind ? ` ${kind}` : '');
    toolbarNotice.classList.toggle('hidden', !text);
  }

  function clearNotice() {
    setNotice('', '');
  }

  function notifyAuthRequired(message) {
    log(message);
    setNotice(message, 'bad');
    setObsStatus('', 'OBS: password required');
    if (settings) settings.open = true;
    try { obsPassword.focus(); } catch (_) {}
  }

  function setObsStatus(kind, text) {
    const isConnected = kind === 'ok';
    const isConnecting = kind === 'warn';

    obsDot.className = 'dot' + (kind ? ` ${kind}` : '');
    obsStatus.textContent = text;
    obsStatusWrap.classList.toggle('hidden', isConnected);

    processingControls.classList.toggle('hidden', !isConnected);
    toolbarConnectBtn.classList.toggle('hidden', isConnected);
    toolbarConnectBtn.disabled = isConnecting;
    toolbarConnectBtn.textContent = isConnecting ? 'Connecting…' : 'Connect';

    connectBtn.classList.toggle('hidden', isConnected);
    connectBtn.disabled = isConnecting;
    disconnectBtn.classList.toggle('hidden', !isConnected);
  }

  function getRetryDelayMs(attempt) {
    return Math.min(INITIAL_RETRY_DELAY_MS * (2 ** attempt), MAX_RETRY_DELAY_MS);
  }

  function clearConnectTimers() {
    if (retryTimer) {
      clearTimeout(retryTimer);
      retryTimer = null;
    }
    if (connectTimeoutTimer) {
      clearTimeout(connectTimeoutTimer);
      connectTimeoutTimer = null;
    }
  }

  function stopAutoConnect() {
    autoConnectEnabled = false;
    clearConnectTimers();
    connectGeneration += 1;
  }

  function scheduleAutoConnectRetry(reason) {
    if (!autoConnectEnabled) return;

    clearConnectTimers();
    const delayMs = getRetryDelayMs(retryAttempt);
    const nextAttempt = retryAttempt + 1;
    retryAttempt += 1;

    const delaySec = delayMs / 1000;
    setObsStatus('', `OBS: retry in ${delaySec}s`);
    log(`${reason} Retrying in ${delaySec}s (attempt ${nextAttempt}).`);

    retryTimer = setTimeout(() => {
      retryTimer = null;
      if (autoConnectEnabled) connectObs();
    }, delayMs);
  }

  function settleConnectAttempt(generation, reason, retry = true) {
    if (generation !== connectGeneration || connectSettled) return;

    connectSettled = true;
    clearConnectTimers();
    connected = false;

    if (retry && autoConnectEnabled && !manualDisconnect) {
      scheduleAutoConnectRetry(reason);
      return;
    }

    setObsStatus('', 'OBS: disconnected');
  }

  function closeWebSocket() {
    if (!ws) return;
    ws.onopen = null;
    ws.onmessage = null;
    ws.onerror = null;
    ws.onclose = null;
    ws.close();
    ws = null;
  }
  function setLastFile(path) {
    lastRecordingPath = path || '';
    updateProcessButtons();
  }

  function updateProcessButtons() {
    const enabled = Boolean(lastRecordingPath.trim());
    speedButtons.forEach((btn) => { btn.disabled = !enabled; });
    presetProcessBtn.disabled = !enabled || !presetSelect.value;
  }

  function applyPresetVisibility() {
    // A selected preset drives processing, so tuck the manual resolution/speed
    // controls into the collapsible Settings panel as adjustable settings.
    // "Custom" (empty value) moves them back into the toolbar as the primary UI.
    // The node is physically relocated rather than class-toggled because it now
    // lives inside the Settings slot, whose own hidden state would otherwise clip
    // it (a hidden parent hides the manual controls regardless of their class).
    const hasPreset = Boolean(presetSelect.value);
    if (hasPreset) {
      manualSettingsSlot.appendChild(manualControls);
      manualSettingsSlot.classList.remove('hidden');
    } else {
      processingControls.appendChild(manualControls);
      manualSettingsSlot.classList.add('hidden');
    }
    manualControls.classList.remove('hidden');
    updateProcessButtons();
  }

  function populatePresetDropdown(presets) {
    presetList = Array.isArray(presets) ? presets : [];
    presetSelect.innerHTML = '';

    const custom = document.createElement('option');
    custom.value = '';
    custom.textContent = 'Custom';
    presetSelect.appendChild(custom);

    presetList.forEach((preset) => {
      const option = document.createElement('option');
      option.value = preset.name;
      option.textContent = preset.name;
      presetSelect.appendChild(option);
    });

    const saved = localStorage.getItem('obsDock.preset') || '';
    const known = presetList.some((preset) => preset.name === saved);
    presetSelect.value = known ? saved : '';
  }

  async function loadPresets() {
    let presets = [];
    try {
      const res = await fetch(PRESETS_URL);
      if (res.ok) presets = await res.json();
    } catch (_) {
      presets = [];
    }

    if (!Array.isArray(presets) || presets.length === 0) {
      // No presets: keep the manual controls in the main UI as before.
      presetControls.classList.add('hidden');
      manualControls.classList.remove('hidden');
      manualSettingsSlot.classList.add('hidden');
      return;
    }

    populatePresetDropdown(presets);
    presetControls.classList.remove('hidden');
    // applyPresetVisibility relocates the manual controls into the Settings
    // panel (named preset) or keeps them in the toolbar (Custom).
    applyPresetVisibility();
  }

  function getResolution() {
    return document.querySelector('input[name="resolution"]:checked').value;
  }

  function getCodec() {
    return document.querySelector('input[name="codec"]:checked').value;
  }

  function toBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  async function sha256Base64(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return toBase64(hash);
  }

  async function makeAuth(password, salt, challenge) {
    const secret = await sha256Base64(password + salt);
    return await sha256Base64(secret + challenge);
  }

  async function handleHello(data) {
    const identify = { rpcVersion: 1 };

    if (data.authentication) {
      const password = obsPassword.value;
      if (!password) {
        authFailed = true;
        ws.close();
        return;
      }
      identify.authentication = await makeAuth(password, data.authentication.salt, data.authentication.challenge);
    }

    ws.send(JSON.stringify({ op: 1, d: identify }));
  }

  function disconnectObs() {
    manualDisconnect = true;
    stopAutoConnect();
    closeWebSocket();
    connected = false;
    setLastFile('');
    setObsStatus('', 'OBS: disconnected');
    log('Disconnected from OBS.');
  }

  function connectObs({ manual = false } = {}) {
    if (manual) {
      autoConnectEnabled = true;
      manualDisconnect = false;
      authFailed = false;
      retryAttempt = 0;
      clearConnectTimers();
      clearNotice();
    }

    closeWebSocket();
    connectGeneration += 1;
    connectSettled = false;
    const generation = connectGeneration;

    localStorage.setItem('obsDock.obsUrl', obsUrl.value);
    localStorage.setItem('obsDock.obsPassword', obsPassword.value);

    const attemptTimeoutMs = getRetryDelayMs(retryAttempt);
    setObsStatus('warn', 'OBS: connecting');
    log(`Connecting to ${obsUrl.value}`);

    try {
      ws = new WebSocket(obsUrl.value, 'obswebsocket.json');
    } catch (e) {
      log(`WebSocket error: ${e.message}`);
      settleConnectAttempt(generation, 'Connect failed.');
      return;
    }

    connectTimeoutTimer = setTimeout(() => {
      if (generation !== connectGeneration || connectSettled || connected) return;
      log(`Connection timed out after ${attemptTimeoutMs / 1000}s.`);
      closeWebSocket();
      settleConnectAttempt(generation, 'Connection timed out.');
    }, attemptTimeoutMs);

    ws.onopen = () => {
      if (generation !== connectGeneration) return;
      log('WebSocket opened, waiting for Hello...');
    };

    ws.onmessage = async (event) => {
      if (generation !== connectGeneration) return;

      const msg = JSON.parse(event.data);

      if (msg.op === 0) {
        await handleHello(msg.d);
        return;
      }

      if (msg.op === 2) {
        clearConnectTimers();
        connectSettled = true;
        authFailed = false;
        retryAttempt = 0;
        connected = true;
        manualDisconnect = false;
        clearNotice();
        if (settings) settings.open = false;
        setObsStatus('ok', 'OBS: connected');
        log('OBS identified. Waiting for recording stop event.');
        return;
      }

      if (msg.op === 5 && msg.d?.eventType === 'RecordStateChanged') {
        const data = msg.d.eventData || {};
        log(`RecordStateChanged: ${data.outputState}`);

        if (data.outputState === 'OBS_WEBSOCKET_OUTPUT_STOPPED' && data.outputPath) {
          setLastFile(data.outputPath);
          log(`Last recording: ${data.outputPath}`);
        }
      }
    };

    ws.onerror = () => {
      if (generation !== connectGeneration) return;
      log('OBS WebSocket error. Проверь Tools → WebSocket Server Settings.');
    };

    ws.onclose = (event) => {
      if (generation !== connectGeneration) return;

      const wasConnected = connected;
      connected = false;
      ws = null;
      clearConnectTimers();

      if (manualDisconnect) {
        connectSettled = true;
        manualDisconnect = false;
        setObsStatus('', 'OBS: disconnected');
        return;
      }

      // OBS closes with 4009 (AuthenticationFailed) on a wrong password; our
      // own authFailed flag covers a missing password. Stop the retry loop and
      // prompt for the password instead of hammering OBS with bad credentials.
      if (authFailed || event.code === 4009) {
        connectSettled = true;
        stopAutoConnect();
        notifyAuthRequired(
          event.code === 4009
            ? 'Неверный пароль OBS. Введите пароль и нажмите Connect.'
            : 'OBS требует пароль. Введите пароль и нажмите Connect.'
        );
        return;
      }

      if (wasConnected) {
        log(`OBS WebSocket closed: ${event.code || ''} ${event.reason || ''}`.trim());
        setLastFile('');
        settleConnectAttempt(generation, 'OBS disconnected.');
        return;
      }

      if (!connectSettled) {
        log(`OBS WebSocket closed: ${event.code || ''} ${event.reason || ''}`.trim());
        settleConnectAttempt(generation, 'Connect failed.');
      }
    };
  }

  async function sendProcess({ speed, preset } = {}) {
    const file = (lastRecordingPath || '').trim();
    if (!file) {
      log('Нет файла. Останови запись в OBS.');
      return;
    }

    const payload = {
      file,
      autoClose: autoClose.checked,
      exe: talksReducerExe.value.trim() || DEFAULT_EXE
    };

    if (preset) {
      payload.preset = preset;
    } else {
      payload.speed = Number(speed);
      payload.resolution = getResolution();
      payload.codec = getCodec();
    }

    localStorage.setItem('obsDock.talksReducerExe', payload.exe);
    if (payload.codec) localStorage.setItem('obsDock.videoCodec', payload.codec);
    localStorage.setItem('obsDock.autoClose', payload.autoClose ? '1' : '0');

    if (preset) {
      log(`Processing: preset=${preset}`);
    } else {
      log(`Processing: speed=${payload.speed}x, resolution=${payload.resolution}, codec=${payload.codec}`);
    }

    try {
      const res = await fetch(PROCESS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      log(text);
    } catch (e) {
      log(`Processing server error: ${e.message}`);
      log('Запусти talks-reducer dock-server.');
    }
  }

  connectBtn.addEventListener('click', () => connectObs({ manual: true }));
  toolbarConnectBtn.addEventListener('click', () => connectObs({ manual: true }));
  disconnectBtn.addEventListener('click', disconnectObs);
  obsPassword.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      connectObs({ manual: true });
    }
  });
  talksReducerExe.addEventListener('change', () => {
    localStorage.setItem('obsDock.talksReducerExe', talksReducerExe.value.trim() || DEFAULT_EXE);
  });
  document.querySelectorAll('input[name="codec"]').forEach((input) => {
    input.addEventListener('change', () => {
      localStorage.setItem('obsDock.videoCodec', getCodec());
    });
  });
  autoClose.addEventListener('change', () => {
    localStorage.setItem('obsDock.autoClose', autoClose.checked ? '1' : '0');
  });

  speedButtons.forEach((btn) => {
    btn.addEventListener('click', () => sendProcess({ speed: btn.dataset.speed }));
  });

  presetSelect.addEventListener('change', () => {
    localStorage.setItem('obsDock.preset', presetSelect.value);
    applyPresetVisibility();
  });

  presetProcessBtn.addEventListener('click', () => {
    if (presetSelect.value) sendProcess({ preset: presetSelect.value });
  });

  updateProcessButtons();
  setObsStatus('', 'OBS: disconnected');
  loadPresets();
  connectObs();
})();
</script>
</body>
</html>
