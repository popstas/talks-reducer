repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        additional_dependencies: ["toml"]
  - repo: local
    hooks:
      - id: generate-changelog
        name: Generate changelog
        entry: git-cliff -o CHANGELOG.md
        language: system
        pass_filenames: false
