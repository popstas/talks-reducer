<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS Processing Dock</title>
  <style>
    :root {
      --bg: #272A33;
      --panel: #272A33;
      --input-bg: #3C404D;
      --text: #e8eaf0;
      --muted: #9aa3b2;
      --line: #3C404D;
      --ok: #35c46a;
      --warn: #f5b942;
      --bad: #ff5c7a;
      --accent: #6ea8fe;
      --accent2: #9ec5fe;
      --shadow: rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 10px 4px 0;
      color: var(--text);
      background: var(--bg);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: 100%;
    }

    .card {
      background: var(--panel);
      padding: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--bad);
    }

    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }

    label.small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row {
      margin-top: 10px;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .radio-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    .radio-pill input { margin: 0; }

    .check-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }

    .check-row input { margin: 0; }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-inline-start: 10px;
    }

    .buttons button {
      flex: 1 1 auto;
      min-width: 3.5em;
    }

    button {
      border: 0;
      border-radius: 3px;
      padding: 10px 10px;
      color: #fff;
      background: var(--input-bg);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .45; cursor: not-allowed; filter: none; }

    .log {
      margin-top: 10px;
      max-height: 150px;
      overflow: auto;
      padding: 8px 10px;
      color: var(--muted);
      background: #0c0e12;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .settings {
      flex: 0 0 auto;
    }

    .settings[open] {
      flex-basis: 100%;
    }

    .settings summary {
      display: inline-block;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      padding: 10px 10px;
      line-height: 1;
    }

    .settings summary::-webkit-details-marker {
      display: none;
    }

    .settings[open] summary {
      margin-bottom: 8px;
    }

    .connection-block {
      margin-top: 10px;
    }

    .connection-block .status {
      margin-bottom: 8px;
    }

    .hidden { display: none; }

    @media (min-width: 301px) {
      .wrap {
        display: flex;
        justify-content: center;
      }

      .card {
        width: fit-content;
        max-width: 100%;
      }

      .toolbar {
        justify-content: center;
      }

      .settings[open] {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .settings[open] > :not(summary) {
        width: min(100%, 480px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div class="radio-group">
          <label class="radio-pill"><input type="radio" name="resolution" value="1080p" /> 1080p</label>
          <label class="radio-pill"><input type="radio" name="resolution" value="720p" checked /> 720p</label>
          <label class="radio-pill"><input type="radio" name="resolution" value="480p" /> 480p</label>
        </div>

        <div class="buttons">
          <button data-speed="1" disabled>1x</button>
          <button data-speed="5" disabled>5x</button>
          <button data-speed="10" disabled>10x</button>
        </div>

        <details class="settings">
          <summary>Settings</summary>
          <div class="row">
            <label class="small">Codec</label>
            <div class="radio-group">
              <label class="radio-pill"><input type="radio" name="codec" value="h264" /> h264</label>
              <label class="radio-pill"><input type="radio" name="codec" value="hevc" checked /> hevc</label>
              <label class="radio-pill"><input type="radio" name="codec" value="av1" /> av1</label>
              <label class="radio-pill"><input type="radio" name="codec" value="mp3" /> mp3</label>
            </div>
          </div>
          <div class="row">
            <label class="check-row">
              <input id="autoClose" type="checkbox" />
              Auto close
            </label>
          </div>
          <div class="row">
            <label class="small" for="talksReducerExe">Talks Reducer</label>
            <input id="talksReducerExe" type="text" value="%LOCALAPPDATA%\Programs\talks-reducer\talks-reducer.exe" />
          </div>
          <div id="log" class="log">Ready.</div>
          <div class="connection-block">
            <span id="obsStatusWrap" class="status"><span id="obsDot" class="dot"></span><span id="obsStatus">OBS: disconnected</span></span>
            <div class="grid">
              <div>
                <label class="small" for="obsUrl">OBS WebSocket</label>
                <input id="obsUrl" type="text" value="ws://127.0.0.1:4455" />
              </div>
              <div>
                <label class="small" for="obsPassword">Password</label>
                <input id="obsPassword" type="password" placeholder="optional" />
              </div>
            </div>
            <button id="connectBtn">Connect to OBS</button>
          </div>
        </details>
      </div>
    </div>
  </div>

<script>
(() => {
  const PROCESS_URL = 'http://127.0.0.1:17890/process';
  const DEFAULT_EXE = '%LOCALAPPDATA%\\Programs\\talks-reducer\\talks-reducer.exe';
  const DEFAULT_CODEC = 'hevc';
  const ALLOWED_CODECS = new Set(['h264', 'hevc', 'av1', 'mp3']);

  const $ = (id) => document.getElementById(id);
  const obsUrl = $('obsUrl');
  const obsPassword = $('obsPassword');
  const talksReducerExe = $('talksReducerExe');
  const autoClose = $('autoClose');
  const obsDot = $('obsDot');
  const obsStatus = $('obsStatus');
  const obsStatusWrap = $('obsStatusWrap');
  const connectBtn = $('connectBtn');
  const logEl = $('log');
  const speedButtons = document.querySelectorAll('button[data-speed]');

  let ws = null;
  let connected = false;
  let lastRecordingPath = '';

  obsUrl.value = localStorage.getItem('obsDock.obsUrl') || obsUrl.value;
  obsPassword.value = localStorage.getItem('obsDock.obsPassword') || '';
  talksReducerExe.value = localStorage.getItem('obsDock.talksReducerExe') || DEFAULT_EXE;
  const savedCodec = localStorage.getItem('obsDock.videoCodec') || DEFAULT_CODEC;
  if (ALLOWED_CODECS.has(savedCodec)) {
    const codecInput = document.querySelector(`input[name="codec"][value="${savedCodec}"]`);
    if (codecInput) codecInput.checked = true;
  }
  autoClose.checked = localStorage.getItem('obsDock.autoClose') === '1';

  function log(message) {
    const time = new Date().toLocaleTimeString();
    logEl.textContent = `[${time}] ${message}\n` + logEl.textContent;
  }

  function setObsStatus(kind, text) {
    obsDot.className = 'dot' + (kind ? ` ${kind}` : '');
    obsStatus.textContent = text;
    obsStatusWrap.classList.toggle('hidden', kind === 'ok');
    connectBtn.textContent = kind === 'ok' ? 'Connected to OBS' : 'Connect to OBS';
    connectBtn.disabled = kind === 'ok';
  }

  function setLastFile(path) {
    lastRecordingPath = path || '';
    updateProcessButtons();
  }

  function updateProcessButtons() {
    const enabled = Boolean(lastRecordingPath.trim());
    speedButtons.forEach((btn) => { btn.disabled = !enabled; });
  }

  function getResolution() {
    return document.querySelector('input[name="resolution"]:checked').value;
  }

  function getCodec() {
    return document.querySelector('input[name="codec"]:checked').value;
  }

  function toBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  async function sha256Base64(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return toBase64(hash);
  }

  async function makeAuth(password, salt, challenge) {
    const secret = await sha256Base64(password + salt);
    return await sha256Base64(secret + challenge);
  }

  async function handleHello(data) {
    const identify = { rpcVersion: 1 };

    if (data.authentication) {
      const password = obsPassword.value;
      if (!password) {
        log('OBS требует пароль. Введи пароль и нажми Connect again.');
        ws.close();
        return;
      }
      identify.authentication = await makeAuth(password, data.authentication.salt, data.authentication.challenge);
    }

    ws.send(JSON.stringify({ op: 1, d: identify }));
  }

  function connectObs() {
    if (ws) ws.close();

    localStorage.setItem('obsDock.obsUrl', obsUrl.value);
    localStorage.setItem('obsDock.obsPassword', obsPassword.value);

    setObsStatus('warn', 'OBS: connecting');
    log(`Connecting to ${obsUrl.value}`);

    try {
      ws = new WebSocket(obsUrl.value, 'obswebsocket.json');
    } catch (e) {
      log(`WebSocket error: ${e.message}`);
      setObsStatus('', 'OBS: error');
      return;
    }

    ws.onopen = () => log('WebSocket opened, waiting for Hello...');

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.op === 0) {
        await handleHello(msg.d);
        return;
      }

      if (msg.op === 2) {
        connected = true;
        setObsStatus('ok', 'OBS: connected');
        log('OBS identified. Waiting for recording stop event.');
        return;
      }

      if (msg.op === 5 && msg.d?.eventType === 'RecordStateChanged') {
        const data = msg.d.eventData || {};
        log(`RecordStateChanged: ${data.outputState}`);

        if (data.outputState === 'OBS_WEBSOCKET_OUTPUT_STOPPED' && data.outputPath) {
          setLastFile(data.outputPath);
          log(`Last recording: ${data.outputPath}`);
        }
      }
    };

    ws.onerror = () => {
      setObsStatus('', 'OBS: websocket error');
      log('OBS WebSocket error. Проверь Tools → WebSocket Server Settings.');
    };

    ws.onclose = (event) => {
      connected = false;
      setObsStatus('', 'OBS: disconnected');
      log(`OBS WebSocket closed: ${event.code || ''} ${event.reason || ''}`.trim());
    };
  }

  async function sendProcess(speed) {
    const file = (lastRecordingPath || '').trim();
    if (!file) {
      log('Нет файла. Останови запись в OBS.');
      return;
    }

    const payload = {
      file,
      speed: Number(speed),
      resolution: getResolution(),
      codec: getCodec(),
      autoClose: autoClose.checked,
      exe: talksReducerExe.value.trim() || DEFAULT_EXE
    };

    localStorage.setItem('obsDock.talksReducerExe', payload.exe);
    localStorage.setItem('obsDock.videoCodec', payload.codec);
    localStorage.setItem('obsDock.autoClose', payload.autoClose ? '1' : '0');

    log(`Processing: speed=${payload.speed}x, resolution=${payload.resolution}, codec=${payload.codec}`);

    try {
      const res = await fetch(PROCESS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      log(text);
    } catch (e) {
      log(`Processing server error: ${e.message}`);
      log('Запусти obs-talks-reducer.ps1 из папки dock.');
    }
  }

  connectBtn.addEventListener('click', connectObs);
  talksReducerExe.addEventListener('change', () => {
    localStorage.setItem('obsDock.talksReducerExe', talksReducerExe.value.trim() || DEFAULT_EXE);
  });
  document.querySelectorAll('input[name="codec"]').forEach((input) => {
    input.addEventListener('change', () => {
      localStorage.setItem('obsDock.videoCodec', getCodec());
    });
  });
  autoClose.addEventListener('change', () => {
    localStorage.setItem('obsDock.autoClose', autoClose.checked ? '1' : '0');
  });

  speedButtons.forEach((btn) => {
    btn.addEventListener('click', () => sendProcess(btn.dataset.speed));
  });

  updateProcessButtons();
  connectObs();
})();
</script>
</body>
</html>
